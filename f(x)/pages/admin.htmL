<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Gauntlet Tiers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            padding: 100px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--gold);
        }
        
        .admin-header p {
            color: var(--text-dim);
        }
        
        .admin-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        
        .admin-sidebar {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            height: fit-content;
        }
        
        .admin-sidebar h3 {
            font-size: 1rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .admin-nav {
            list-style: none;
        }
        
        .admin-nav li {
            margin-bottom: 10px;
        }
        
        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-radius: 6px;
            color: var(--text-dim);
            transition: all 0.2s;
        }
        
        .admin-nav a:hover, .admin-nav a.active {
            background: var(--bg-3);
            color: var(--text);
        }
        
        .admin-nav a.active {
            border-left: 3px solid var(--gold);
        }
        
        .admin-content {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
        }
        
        .admin-section {
            display: none;
        }
        
        .admin-section.active {
            display: block;
        }
        
        .admin-section h2 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: var(--bg-3);
            border-radius: 4px;
            cursor: pointer;
        }
        
        .checkbox-item input {
            width: auto;
        }
        
        .players-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .players-table th,
        .players-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .players-table th {
            font-family: var(--font-main);
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        
        .players-table tr:hover {
            background: var(--bg-3);
        }
        
        .table-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        
        .btn-edit {
            background: var(--ht4);
            color: #fff;
        }
        
        .btn-delete {
            background: var(--accent);
            color: #fff;
        }
        
        .access-denied {
            text-align: center;
            padding: 150px 20px;
        }
        
        .access-denied i {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
        
        .access-denied h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .access-denied p {
            color: var(--text-dim);
            margin-bottom: 25px;
        }
        
        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .checkbox-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>GAUNTLET TIERS</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="tierlist.html" class="nav-link">Tier List</a></li>
                <li><a href="community.html" class="nav-link">Community</a></li>
                <li><a href="support.html" class="nav-link">Support</a></li>
            </ul>
            <div class="nav-user" id="navUser">
                <span class="nav-username" id="navUsername"></span>
                <a href="admin.html" class="btn btn-admin" id="navAdmin">Admin</a>
                <a href="profile.html" class="btn btn-secondary btn-nav">Profile</a>
                <button class="btn btn-nav" onclick="logout()" style="background: transparent; border: 1px solid var(--border);">Logout</button>
            </div>
            <div class="nav-user" id="navGuest">
                <a href="login.html" class="btn btn-primary btn-nav">Login</a>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div id="adminContent"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="../index.html" class="footer-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>GAUNTLET TIERS</span>
                </a>
                <div class="footer-links">
                    <a href="../index.html">Home</a>
                    <a href="tierlist.html">Rankings</a>
                    <a href="community.html">Community</a>
                    <a href="support.html">Support</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        const currentUser = getCurrentUser();
        const container = document.getElementById('adminContent');
        
        // Verifica se é admin
        if (!currentUser || !isAdmin(currentUser.email)) {
            container.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-lock"></i>
                    <h2>Access Denied</h2>
                    <p>You don't have permission to access this page.</p>
                    <a href="../index.html" class="btn btn-primary">Go Home</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="admin-container">
                    <div class="admin-header">
                        <h1><i class="fas fa-crown"></i> Admin Panel</h1>
                        <p>Manage players, tiers, and rankings</p>
                    </div>
                    
                    <div class="admin-grid">
                        <div class="admin-sidebar">
                            <h3>Menu</h3>
                            <ul class="admin-nav">
                                <li><a href="#" class="active" onclick="showSection('add-player')"><i class="fas fa-user-plus"></i> Add Player</a></li>
                                <li><a href="#" onclick="showSection('manage-players')"><i class="fas fa-users"></i> Manage Players</a></li>
                                <li><a href="#" onclick="showSection('stats')"><i class="fas fa-chart-line"></i> Statistics</a></li>
                            </ul>
                        </div>
                        
                        <div class="admin-content">
                            <!-- Add Player Section -->
                            <div id="add-player" class="admin-section active">
                                <h2>Add New Player to Rankings</h2>
                                <form id="addPlayerForm">
                                    <div class="form-group">
                                        <label>Minecraft Username</label>
                                        <input type="text" id="playerUsername" placeholder="Player's username" required>
                                    </div>
                                    
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Tier</label>
                                            <select id="playerTier" required>
                                                <option value="">Select Tier</option>
                                                <option value="ht1">HT1 - High Tier 1 (Elite)</option>
                                                <option value="lt1">LT1 - Low Tier 1</option>
                                                <option value="ht2">HT2 - High Tier 2</option>
                                                <option value="lt2">LT2 - Low Tier 2</option>
                                                <option value="ht3">HT3 - High Tier 3</option>
                                                <option value="lt3">LT3 - Low Tier 3</option>
                                                <option value="ht4">HT4 - High Tier 4</option>
                                                <option value="lt4">LT4 - Low Tier 4</option>
                                                <option value="ht5">HT5 - High Tier 5</option>
                                                <option value="lt5">LT5 - Low Tier 5 (Entry)</option>
                                            </select>
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Email (optional)</label>
                                            <input type="email" id="playerEmail" placeholder="player@example.com">
                                        </div>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Game Modes</label>
                                        <div class="checkbox-group">
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="sword" class="mode-checkbox">
                                                <span>Sword</span>
                                            </label>
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="axe" class="mode-checkbox">
                                                <span>Axe</span>
                                            </label>
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="uhc" class="mode-checkbox">
                                                <span>UHC</span>
                                            </label>
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="pot" class="mode-checkbox">
                                                <span>Pot</span>
                                            </label>
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="crystal" class="mode-checkbox">
                                                <span>Crystal</span>
                                            </label>
                                            <label class="checkbox-item">
                                                <input type="checkbox" value="smp" class="mode-checkbox">
                                                <span>SMP</span>
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div class="form-row" style="margin-top: 20px;">
                                        <div class="form-group">
                                            <label>Wins</label>
                                            <input type="number" id="playerWins" value="0" min="0">
                                        </div>
                                        <div class="form-group">
                                            <label>Losses</label>
                                            <input type="number" id="playerLosses" value="0" min="0">
                                        </div>
                                    </div>
                                    
                                    <div class="form-error" id="addPlayerError"></div>
                                    
                                    <button type="submit" class="btn btn-primary" style="margin-top: 20px;">
                                        <i class="fas fa-plus"></i> Add Player
                                    </button>
                                </form>
                            </div>
                            
                            <!-- Manage Players Section -->
                            <div id="manage-players" class="admin-section">
                                <h2>Manage Players</h2>
                                <div style="overflow-x: auto;">
                                    <table class="players-table">
                                        <thead>
                                            <tr>
                                                <th>Username</th>
                                                <th>Tier</th>
                                                <th>Modes</th>
                                                <th>W/L</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="playersTableBody">
                                            <!-- Populated by JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <!-- Stats Section -->
                            <div id="stats" class="admin-section">
                                <h2>Platform Statistics</h2>
                                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                                    <div class="stat-box" style="text-align: center; padding: 30px; background: var(--bg-3); border-radius: 8px;">
                                        <div class="num" id="totalPlayers" style="font-family: var(--font-main); font-size: 2.5rem; font-weight: 700; color: var(--accent);">0</div>
                                        <div class="label" style="color: var(--text-dim); text-transform: uppercase;">Total Players</div>
                                    </div>
                                    <div class="stat-box" style="text-align: center; padding: 30px; background: var(--bg-3); border-radius: 8px;">
                                        <div class="num" id="totalUsers" style="font-family: var(--font-main); font-size: 2.5rem; font-weight: 700; color: var(--accent);">0</div>
                                        <div class="label" style="color: var(--text-dim); text-transform: uppercase;">Registered Users</div>
                                    </div>
                                    <div class="stat-box" style="text-align: center; padding: 30px; background: var(--bg-3); border-radius: 8px;">
                                        <div class="num" id="ht1Count" style="font-family: var(--font-main); font-size: 2.5rem; font-weight: 700; color: var(--ht1);">0</div>
                                        <div class="label" style="color: var(--text-dim); text-transform: uppercase;">HT1 Players</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Inicializa funcionalidades do admin
            initAdmin();
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-nav a').forEach(a => a.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
            
            if (sectionId === 'manage-players') {
                renderPlayersTable();
            } else if (sectionId === 'stats') {
                updateStats();
            }
        }
        
        function initAdmin() {
            // Form de adicionar player
            document.getElementById('addPlayerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('playerUsername').value;
                const tier = document.getElementById('playerTier').value;
                const email = document.getElementById('playerEmail').value;
                const wins = parseInt(document.getElementById('playerWins').value) || 0;
                const losses = parseInt(document.getElementById('playerLosses').value) || 0;
                
                const modes = [];
                document.querySelectorAll('.mode-checkbox:checked').forEach(cb => {
                    modes.push(cb.value);
                });
                
                const result = addPlayer({
                    username,
                    tier,
                    email: email || null,
                    modes,
                    wins,
                    losses
                });
                
                if (result.success) {
                    alert('Player added successfully!');
                    this.reset();
                    document.getElementById('addPlayerError').textContent = '';
                } else {
                    document.getElementById('addPlayerError').textContent = result.message;
                }
            });
        }
        
        function renderPlayersTable() {
            const players = getPlayers();
            const tbody = document.getElementById('playersTableBody');
            
            tbody.innerHTML = players.map(p => {
                const tierData = getTierData(p.tier);
                return `
                    <tr>
                        <td><strong>${p.username}</strong></td>
                        <td><span class="tier-badge ${tierData.class}">${tierData.name}</span></td>
                        <td>${p.modes ? p.modes.map(m => m.charAt(0).toUpperCase() + m.slice(1)).join(', ') : '-'}</td>
                        <td>${p.wins || 0}/${p.losses || 0}</td>
                        <td class="table-actions">
                            <button class="btn btn-small btn-edit" onclick="editPlayer('${p.username}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-small btn-delete" onclick="deletePlayer('${p.username}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function updateStats() {
            const players = getPlayers();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            document.getElementById('totalPlayers').textContent = players.length;
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('ht1Count').textContent = players.filter(p => p.tier === 'ht1').length;
        }
        
        function deletePlayer(username) {
            if (confirm(`Are you sure you want to remove ${username} from the rankings?`)) {
                const result = removePlayer(username);
                if (result.success) {
                    renderPlayersTable();
                    updateStats();
                }
            }
        }
        
        function editPlayer(username) {
            const players = getPlayers();
            const player = players.find(p => p.username === username);
            if (!player) return;
            
            const newTier = prompt(`Current tier: ${player.tier}\nEnter new tier (ht1, lt1, ht2, lt2, ht3, lt3, ht4, lt4, ht5, lt5):`, player.tier);
            if (newTier && ['ht1','lt1','ht2','lt2','ht3','lt3','ht4','lt4','ht5','lt5'].includes(newTier)) {
                player.tier = newTier;
                localStorage.setItem('players', JSON.stringify(players));
                renderPlayersTable
                updateStats();
            }
        }
    </script>
</body>
</html>
